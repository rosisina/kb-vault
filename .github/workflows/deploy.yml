# Aurora Intelligence — GitHub Pages automated deployment
# Triggers on every push to main branch
# Result: https://rosisina.github.io/kb-vault/
#
# To activate: Settings → Pages → Source: GitHub Actions

name: Deploy Aurora Intelligence

on:
  push:
    branches: [main]
    paths:
      - 'ui/src/**'
      - 'ui/angular.json'
      - 'ui/package.json'
      - 'ui/public/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ui

      - name: Build Angular (production)
        run: npm run build -- --configuration production --base-href /kb-vault/
        working-directory: ui

      # Pre-deploy pseudonymization gate (Layer 3)
      - name: Scan for real names in dist/
        run: python3 scripts/scan-for-real-names.py ui/dist/ui/browser
        working-directory: .

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ui/dist/ui/browser

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
