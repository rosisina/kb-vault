<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>Aurora Intelligence</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta name="robots" content="noindex, nofollow">

  <!-- Password Gate -->
  <script>
  (function() {
    var KEY = 'aurora_auth_v1';
    var PASS = 'aurora2024';
    if (localStorage.getItem(KEY) === '1') return;
    document.addEventListener('DOMContentLoaded', function() {
      var overlay = document.createElement('div');
      overlay.id = 'pw-gate';
      overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;background:#1a1a2e;display:flex;align-items:center;justify-content:center;font-family:sans-serif;';
      overlay.innerHTML = '<div style="background:#fff;border-radius:12px;padding:40px 32px;max-width:360px;width:90%;text-align:center;">'
        + '<div style="font-size:1.4rem;font-weight:700;color:#2d2d2d;margin-bottom:8px;">Aurora Intelligence</div>'
        + '<div style="font-size:0.85rem;color:#888;margin-bottom:24px;">접근 코드를 입력하세요</div>'
        + '<input id="pw-input" type="password" placeholder="Access code" style="width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:1rem;box-sizing:border-box;margin-bottom:12px;">'
        + '<div id="pw-error" style="color:#e53935;font-size:0.8rem;margin-bottom:8px;min-height:1.2em;"></div>'
        + '<button id="pw-btn" style="width:100%;padding:11px;background:#534bae;color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;">입장</button>'
        + '</div>';
      document.body.appendChild(overlay);
      var input = document.getElementById('pw-input');
      var btn = document.getElementById('pw-btn');
      var err = document.getElementById('pw-error');
      function attempt() {
        if (input.value === PASS) {
          localStorage.setItem(KEY, '1');
          overlay.remove();
        } else {
          err.textContent = '코드가 올바르지 않습니다.';
          input.value = '';
          input.focus();
        }
      }
      btn.addEventListener('click', attempt);
      input.addEventListener('keydown', function(e) { if (e.key === 'Enter') attempt(); });
      input.focus();
    });
  })();
  </script>

  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
  <app-root></app-root>
</body>
</html>
