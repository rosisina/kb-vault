  <script type="application/ld+json">
  {"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"2016년 DIDC 해킹 사건의 진짜 침투 경로가 舊KIATIS였다는 사실이 왜 7층위 증명체계의 출발점이 되는가?","acceptedAnswer":{"@type":"Answer","text":"2016년 DIDC 해킹의 실제 침투 경로는 舊KIATIS(인터넷 기반, VPN 미적용)였다는 사실이 제1층위의 근간이다. 舊KIATIS는 15년간(2007~2022) VPN·DB접근제어 없이 인터넷에 노출되어 운영되었으며, 국방망과 연동하는 이중 구조를 지녀 2016 해킹의 교두보 역할을 했다. 이 사실의 은폐가 제2층위 사업구조 조작, 제3층위 훈령개정, 제4층위 시험평가 왜곡, 제5층위 허위 갑질 신고, 제6층위 사기수사, 제7층위 기소유예로 이어지는 일련의 조직범죄를 유발한 원초적 동기이다."}},{"@type":"Question","name":"Active-X 제거 사업이 舊KIATIS의 보안 위반 이력을 삭제하는 세탁기 역할을 했다는 구체적 정황은 무엇인가?","acceptedAnswer":{"@type":"Answer","text":"Active-X 제거 사업은 舊KIATIS의 15년 보안 취약점을 은폐하기 위한 체계적 세탁 메커니즘으로 작동했다. 국유단이 2018년 7월 국전원에 발송한 성능개선 사업 추진 요청 공문(기록 제1,051쪽)에서 사업의 기대효과로 Active-X 사용 중단으로 보안 취약요소 제거를 명시했다. Active-X 제거로 舊시스템의 기술적 구조가 파괴되면 2016년 해킹 경로 추적이 원천 차단된다."}},{"@type":"Question","name":"舊KIATIS가 15년간 VPN 없이 인터넷에 직접 노출되었다는 사실이 창군 이래 최악의 보안 사고인 이유는?","acceptedAnswer":{"@type":"Answer","text":"舊KIATIS의 15년간 VPN 미사용 인터넷 직접 노출은 창군 이래 최악의 보안 사고다. 이 시스템은 국방망(인트라넷)과 연동하는 bridge 역할을 수행했기 때문에 2016년 DIDC 북한 해킹의 직접 공격 경로였다. Active-X 클라이언트 취약점, VPN/DB접근제어 부재, 보안장비 완전 미설치의 4중 APT 취약점 구조였으며, DIDC 부대예규 제12호가 규정한 긴급 점검 의무가 모두 위반되었다."}},{"@type":"Question","name":"국방부 검찰단이 범죄 기관이라는 결론의 법적 근거는 무엇인가?","acceptedAnswer":{"@type":"Answer","text":"검찰단이 범죄 기관이라는 결론은 네 가지 법적·윤리적 근거에 기초한다. 첫째, 동일성 오류를 기만기술로 사용한 사기수사. 2019년 시험평가 환경과 2022년 수사 시점의 운영 환경을 의도적으로 동일시하여 법적 판단을 기만했다. 둘째, 2019년 행위에 2020년 6월 개정 훈령을 소급 적용. 셋째, 무혐의 인지 후 수사 계속. 넷째, 방화벽 정책 결재선 중 중간 검토자만 피의자 지정하여 선택적 범죄자 만들기."}},{"@type":"Question","name":"허위 갑질 신고가 수사 기관으로 넘어가는 과정에서 나타난 행정적 맞춤형 타이밍은?","acceptedAnswer":{"@type":"Answer","text":"2022년 2월 8일 회의 종료 후 정확히 48시간 만에 갑질 신고가 접수되었다. 국전원장이 회의 당일 이미 독방 격리 사무실을 준비해두었음을 자백하는 발언을 했으며, 신고자는 신고 직후 육군본부로 영전했다. 이는 허위 신고와 그에 대한 행정적 보상이 사전에 조율된 조직적 범행임을 시사한다."}},{"@type":"Question","name":"기소유예 결정이 저자의 헌법상 재판받을 권리를 어떻게 침해했는가?","acceptedAnswer":{"@type":"Answer","text":"기소유예는 혐의를 인정하면서도 기소를 유예하는 처분으로, 법원의 판단을 거치지 않고 검찰이 유죄 낙인을 찍는 구조다. 피의자는 무죄를 입증할 재판 기회 자체를 박탈당하며, 기소유예 기록은 전역 후에도 전과 기록처럼 취급된다. 동일 공문의 최종 결재자는 제외하고 중간 검토자만 기소유예한 것은 표적수사의 결정적 증거다."}}]}
