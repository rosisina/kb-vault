<!-- Aurora v2 — Toolbar: State A에서 검색 숨김, State B에서 검색 표시 (2.5배) -->
<div class="aurora-toolbar">
  <a class="brand-link" routerLink="/">
    <img src="aurora-icon.png" alt="Aurora" class="brand-icon">
    <span class="title">Aurora Intelligence</span>
  </a>
  <a class="subtitle-link" routerLink="/">
    {{ lang.lang() === 'kr' ? '국가 및 국방 차원의 범죄증명 플랫폼' : 'National & Defense Crime Proof Platform' }}
  </a>

  <!-- 상단 검색: State B에서만 표시 (proofActive가 true일 때) -->
  @if (proofActive) {
    <div class="toolbar-search">
      <span class="material-icons search-icon">search</span>
      <input class="toolbar-search-input"
             [(ngModel)]="searchQuery"
             (keyup.enter)="onSearch()"
             [placeholder]="lang.lang() === 'kr' ? '오로라에게 질문해 보세요' : 'Ask Aurora'">
    </div>
  }

  <span class="spacer"></span>
  <button class="lang-toggle" (click)="toggleLang()">
    <span class="material-icons lang-icon">language</span>
    {{ lang.lang() === 'kr' ? 'KR' : 'EN' }}
  </button>
</div>

<main class="aurora-content">
  <router-outlet />
</main>
